<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nghỉ phép (JSON Sync)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --font-sans: -apple-system, system-ui, sans-serif;
            --color-bg: #ffffff;
            --color-border: #eeeeee;
            --color-primary: #1890ff;
        }
        body { font-family: var(--font-sans); background: #fafafa; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; padding: 10px; background: #f9f9f9; border-radius: 8px; justify-content: center;}
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: white; font-size: 13px; transition: 0.2s; }
        .btn:hover { background: #f0f0f0; }
        .btn-primary { background: var(--color-primary); color: white; border: none; }
        .btn-primary:hover { opacity: 0.9; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function LeaveManager() {
            const [leaves, setLeaves] = useState({});
            const [year, setYear] = useState(new Date().getFullYear());

            // 1. Tự động lưu/tải từ máy hiện tại (LocalStorage)
            useEffect(() => {
                const saved = localStorage.getItem(`leaves_${year}`);
                if (saved) setLeaves(JSON.parse(saved));
            }, [year]);

            useEffect(() => {
                localStorage.setItem(`leaves_${year}`, JSON.stringify(leaves));
            }, [leaves, year]);

            // 2. Hàm XUẤT file (Export)
            const exportData = () => {
                const dataStr = JSON.stringify(leaves, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `nghi_phep_${year}.json`;
                link.click();
            };

            // 3. Hàm NHẬP file (Import)
            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        setLeaves(json);
                        alert("Đã cập nhật dữ liệu thành công!");
                    } catch (err) {
                        alert("File không đúng định dạng!");
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="container">
                    <h2 style={{textAlign: 'center'}}>📅 Quản lý nghỉ phép {year}</h2>
                    
                    <div className="toolbar">
                        <button className="btn" onClick={exportData}>📥 Tải dữ liệu về máy</button>
                        
                        <label className="btn btn-primary">
                            📤 Tải dữ liệu lên
                            <input type="file" accept=".json" onChange={importData} />
                        </label>
                    </div>

                    <div style={{textAlign: 'center', color: '#888', border: '2px dashed #eee', padding: '40px', borderRadius: '12px'}}>
                        <p>Dữ liệu đang được lưu tạm thời trên trình duyệt này.</p>
                        <p>Sử dụng 2 nút phía trên để "di cư" dữ liệu sang máy khác!</p>
                        <small>(Dán tiếp phần UI Calendar của bạn vào đây là hoàn hảo)</small>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LeaveManager />);
    </script>
</body>
</html>
