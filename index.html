<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nghỉ phép 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --color-bg-main: #f8f9fa;
            --color-card-bg: #ffffff;
            --color-primary: #007bff;
            --color-text-main: #333;
            --color-text-muted: #6c757d;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { 
            margin: 0; 
            background-color: var(--color-bg-main); 
            color: var(--color-text-main); 
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 20px; }
        
        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--color-card-bg); padding: 1.2rem; border-radius: var(--border-radius); box-shadow: var(--shadow); }
        .stat-label { font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1D9E75; }

        /* Calendar Styling */
        .calendar-container { background: var(--color-card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); overflow: hidden; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-bottom: 1px solid #eee; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 1.5rem; }
        .day-header { text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--color-text-muted); padding-bottom: 10px; }
        
        .day-cell { 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; position: relative;
        }
        .day-cell:hover:not(.weekend) { background: #f0f7ff; }
        .day-cell.weekend { color: #dee2e6; cursor: default; }
        .day-cell.today { border: 2px solid #007bff; font-weight: bold; }
        
        /* Badges & Dots */
        .half-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 2px; }
        .leave-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; margin-top: 4px; font-weight: 500; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        .type-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 1rem 0; }
        .type-btn { padding: 10px; border: 1px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 0.85rem; text-align: center; }
        .type-btn.active { border-color: transparent; font-weight: 600; }

        .btn-save { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .btn-cancel { background: transparent; border: none; color: #6c757d; width: 100%; margin-top: 0.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // === DÁN FIREBASE CONFIG CỦA BẠN VÀO ĐÂY ===
        const firebaseConfig = {
            apiKey: "AIzaSyAkKbXmU_nFvFJT6QcgI2KiRzux-Mb2PFg",
            authDomain: "project-76b15d43-d9c9-4a13-880.firebaseapp.com",
            databaseURL: "https://project-76b15d43-d9c9-4a13-880-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "project-76b15d43-d9c9-4a13-880",
            storageBucket: "project-76b15d43-d9c9-4a13-880.appspot.com",
            messagingSenderId: "274258504150",
            appId: "1:274258504150:web:9d0e6c5f95ae71a683dc77",
            measurementId: "G-E3MP9S2KQ4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const { useState, useEffect, useCallback } = React;

        const LEAVE_TYPES = [
            { id: "annual", label: "Phép năm", color: "#1D9E75", bg: "#E1F5EE" },
            { id: "sick", label: "Phép ốm", color: "#D85A30", bg: "#FAECE7" },
            { id: "personal", label: "Việc cá nhân", color: "#185FA5", bg: "#E6F1FB" },
            { id: "maternity", label: "Thai sản", color: "#993556", bg: "#FBEAF0" },
            { id: "unpaid", label: "Không lương", color: "#5F5E5A", bg: "#F1EFE8" },
            { id: "wfh", label: "Làm từ xa (WFH)", color: "#534AB7", bg: "#EEEDFE" },
        ];

        const WEEKDAYS = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
        const MONTHS = ["Tháng 1","Tháng 2","Tháng 3","Tháng 4","Tháng 5","Tháng 6","Tháng 7","Tháng 8","Tháng 9","Tháng 10","Tháng 11","Tháng 12"];

        function LeaveManager() {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            const [year, setYear] = useState(today.getFullYear());
            const [currentMonth, setCurrentMonth] = useState(today.getMonth());
            const [leaves, setLeaves] = useState({});
            const [totalLeave, setTotalLeave] = useState(15);
            const [loading, setLoading] = useState(true);
            const [showModal, setShowModal] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [modalData, setModalData] = useState({ type: "annual", note: "", half: false });

            useEffect(() => {
                const ref = db.ref(`data_2026/${year}`);
                ref.on('value', (s) => {
                    const val = s.val();
                    if (val) {
                        setLeaves(val.leaves || {});
                        setTotalLeave(val.totalLeave || 15);
                    }
                    setLoading(false);
                });
                return () => ref.off();
            }, [year]);

            const handleSave = () => {
                const newLeaves = { ...leaves, [selectedDate]: { ...modalData, date: selectedDate } };
                db.ref(`data_2026/${year}`).set({ leaves: newLeaves, totalLeave });
                setShowModal(false);
            };

            const handleDelete = () => {
                const newLeaves = { ...leaves };
                delete newLeaves[selectedDate];
                db.ref(`data_2026/${year}`).set({ leaves: newLeaves, totalLeave });
                setShowModal(false);
            };

            const stats = (() => {
                let taken = 0;
                Object.values(leaves).forEach(l => { if(l.type !== "wfh") taken += (l.half ? 0.5 : 1); });
                return { taken, remaining: totalLeave - taken };
            })();

            if (loading) return <div style={{padding: 50, textAlign:'center'}}>🚀 Đang tải dữ liệu Cloud...</div>;

            const firstDay = new Date(year, currentMonth, 1).getDay();
            const daysInMonth = new Date(year, currentMonth + 1, 0).getDate();
            const calendarCells = [...Array(firstDay).fill(null), ...Array.from({length: daysInMonth}, (_, i) => i + 1)];

            return (
                <div className="container">
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: '1.5rem'}}>
                        <h1 style={{fontSize: '1.5rem', margin: 0}}>Lịch Nghỉ Phép {year}</h1>
                        <div style={{display:'flex', gap: '8px'}}>
                            <button onClick={()=>setYear(year-1)} style={{padding: '5px 10px', borderRadius: '6px', border: '1px solid #ddd'}}>‹</button>
                            <button onClick={()=>setYear(year+1)} style={{padding: '5px 10px', borderRadius: '6px', border: '1px solid #ddd'}}>›</button>
                        </div>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Tổng phép năm</div>
                            <input type="number" value={totalLeave} onChange={e => {
                                const val = Number(e.target.value);
                                setTotalLeave(val);
                                db.ref(`data_2026/${year}/totalLeave`).set(val);
                            }} style={{fontSize:'1.8rem', fontWeight:700, border:'none', width:'100%', outline:'none', color:'#1D9E75'}} />
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Đã nghỉ</div>
                            <div className="stat-value" style={{color: '#D85A30'}}>{stats.taken}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Còn lại</div>
                            <div className="stat-value" style={{color: stats.remaining < 3 ? '#ff4d4f' : '#1D9E75'}}>{stats.remaining}</div>
                        </div>
                    </div>

                    <div className="calendar-container">
                        <div className="calendar-header">
                            <button onClick={()=>setCurrentMonth(currentMonth===0?11:currentMonth-1)} style={{background:'none', border:'none', fontSize:'1.2rem', cursor:'pointer'}}>‹</button>
                            <h2 style={{fontSize: '1.1rem', margin: 0}}>{MONTHS[currentMonth]} {year}</h2>
                            <button onClick={()=>setCurrentMonth(currentMonth===11?0:currentMonth+1)} style={{background:'none', border:'none', fontSize:'1.2rem', cursor:'pointer'}}>›</button>
                        </div>
                        <div className="calendar-grid">
                            {WEEKDAYS.map(w => <div key={w} className="day-header">{w}</div>)}
                            {calendarCells.map((d, i) => {
                                if (!d) return <div key={i} />;
                                const dateStr = `${year}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                const isSun = i % 7 === 0;
                                const isSat = i % 7 === 6;
                                const leave = leaves[dateStr];
                                const type = leave ? LEAVE_TYPES.find(t => t.id === leave.type) : null;

                                return (
                                    <div key={i} 
                                        className={`day-cell ${isSun || isSat ? 'weekend' : ''} ${dateStr === todayStr ? 'today' : ''}`}
                                        onClick={() => {
                                            if (isSun || isSat) return;
                                            setSelectedDate(dateStr);
                                            setModalData(leave || { type: "annual", note: "", half: false });
                                            setShowModal(true);
                                        }}
                                        style={type ? { background: type.bg, color: type.color, fontWeight: 600 } : {}}>
                                        {d}
                                        {leave?.half && <div className="half-dot" style={{background: type?.color}} />}
                                        {type && <div className="leave-badge" style={{background: 'rgba(255,255,255,0.5)'}}>{type.label}</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {showModal && (
                        <div className="modal-overlay" onClick={(e)=> e.target === e.currentTarget && setShowModal(false)}>
                            <div className="modal-content">
                                <h3 style={{marginTop: 0, fontSize: '1.2rem'}}>Ngày {selectedDate.split('-').reverse().join('/')}</h3>
                                
                                <div className="stat-label">Chọn loại hình:</div>
                                <div className="type-selector">
                                    {LEAVE_TYPES.map(t => (
                                        <div key={t.id} 
                                            className={`type-btn ${modalData.type === t.id ? 'active' : ''}`}
                                            onClick={() => setModalData({...modalData, type: t.id})}
                                            style={modalData.type === t.id ? {background: t.bg, color: t.color, borderColor: t.color} : {}}>
                                            {t.label}
                                        </div>
                                    ))}
                                </div>

                                <label style={{display:'flex', alignItems:'center', gap:'8px', fontSize: '0.9rem', marginBottom: '1rem', cursor: 'pointer'}}>
                                    <input type="checkbox" checked={modalData.half} onChange={e => setModalData({...modalData, half: e.target.checked})} />
                                    Nghỉ nửa ngày (0.5)
                                </label>

                                <div className="stat-label">Ghi chú:</div>
                                <input type="text" value={modalData.note} onChange={e => setModalData({...modalData, note: e.target.value})} 
                                    placeholder="Lý do nghỉ..."
                                    style={{width:'100%', padding:'10px', borderRadius:'8px', border:'1px solid #ddd', boxSizing:'border-box'}} />

                                <button className="btn-save" onClick={handleSave}>Lưu thông tin</button>
                                {leaves[selectedDate] && <button className="btn-cancel" style={{color: '#ff4d4f'}} onClick={handleDelete}>Xóa ngày nghỉ này</button>}
                                <button className="btn-cancel" onClick={() => setShowModal(false)}>Hủy bỏ</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LeaveManager />);
    </script>
</body>
</html>
